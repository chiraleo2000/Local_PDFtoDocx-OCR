services:
  localocr:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ACCELERATOR: cpu
    image: localocr:0.5.2-cpu
    container_name: localocr-cpu-0.5.2
    restart: unless-stopped
    environment:
      ACCELERATOR: cpu
      USE_GPU: "false"
      ONNX_PROVIDERS: CPUExecutionProvider
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "7870"
      QUALITY_PRESET: accurate
      OCR_ENGINE: auto
      DISABLE_TROCR_PRELOAD: "0"
      LANGUAGES: tha+eng
      LAYOUT_MODE: absolute
      LAYOUT_BACKEND: docling
      DOCLING_USE_LOCALOCR_PLUGIN: "1"
      ENHANCE_IMAGES: "true"
      ENHANCE_BINARIZE: "0"
      PIXEL_GRID: "1"
      YOLO_CONFIDENCE: "0.25"
      YOLO_NMS: "0.40"
      YOLO_IMGSZ: "1600"
      TABLE_ENGINE: paddleocr
      TABLE_DETECTION: "true"
      IMAGE_EXTRACTION: "true"
      # Multi-CPU / multi-user (0 or unset = auto from container CPU count)
      MAX_CONCURRENT_JOBS: "0"
      PAGE_WORKERS: "0"
      MODEL_SLOTS: "0"
      OMP_NUM_THREADS: "1"
      TORCH_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      QUEUE_MAX_SIZE: "64"
      CORRECTION_DATA_DIR: /app/correction_data
    ports:
      - "7870:7870"
    volumes:
      - localocr_correction_data:/app/correction_data
      - localocr_history:/tmp/pdf_ocr_history

  localocr-gpu:
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ACCELERATOR: cuda
    image: localocr:cuda
    container_name: localocr-gpu
    restart: unless-stopped
    environment:
      ACCELERATOR: cuda
      USE_GPU: "true"
      ONNX_PROVIDERS: CUDAExecutionProvider,CPUExecutionProvider
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "7870"
      QUALITY_PRESET: accurate
      OCR_ENGINE: auto
      DISABLE_TROCR_PRELOAD: "0"
      LANGUAGES: tha+eng
      LAYOUT_MODE: absolute
      LAYOUT_BACKEND: docling
      DOCLING_USE_LOCALOCR_PLUGIN: "1"
      ENHANCE_IMAGES: "true"
      ENHANCE_BINARIZE: "0"
      PIXEL_GRID: "1"
      YOLO_CONFIDENCE: "0.25"
      YOLO_NMS: "0.40"
      YOLO_IMGSZ: "1600"
      TABLE_ENGINE: paddleocr
      TABLE_DETECTION: "true"
      IMAGE_EXTRACTION: "true"
      MAX_CONCURRENT_JOBS: "0"
      PAGE_WORKERS: "0"
      MODEL_SLOTS: "0"
      OMP_NUM_THREADS: "1"
      TORCH_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      QUEUE_MAX_SIZE: "64"
      CORRECTION_DATA_DIR: /app/correction_data
    ports:
      - "7870:7870"
    volumes:
      - localocr_correction_data:/app/correction_data
      - localocr_history:/tmp/pdf_ocr_history
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  localocr-npu:
    profiles: ["npu"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ACCELERATOR: npu
    image: localocr:npu-openvino
    container_name: localocr-npu
    restart: unless-stopped
    environment:
      ACCELERATOR: npu
      USE_GPU: "false"
      ONNX_PROVIDERS: OpenVINOExecutionProvider,CPUExecutionProvider
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "7870"
      QUALITY_PRESET: accurate
      OCR_ENGINE: auto
      DISABLE_TROCR_PRELOAD: "0"
      LANGUAGES: tha+eng
      LAYOUT_MODE: absolute
      LAYOUT_BACKEND: docling
      DOCLING_USE_LOCALOCR_PLUGIN: "1"
      ENHANCE_IMAGES: "true"
      ENHANCE_BINARIZE: "0"
      PIXEL_GRID: "1"
      YOLO_CONFIDENCE: "0.25"
      YOLO_NMS: "0.40"
      YOLO_IMGSZ: "1600"
      TABLE_ENGINE: paddleocr
      TABLE_DETECTION: "true"
      IMAGE_EXTRACTION: "true"
      MAX_CONCURRENT_JOBS: "0"
      PAGE_WORKERS: "0"
      MODEL_SLOTS: "0"
      OMP_NUM_THREADS: "1"
      TORCH_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      QUEUE_MAX_SIZE: "64"
      CORRECTION_DATA_DIR: /app/correction_data
    ports:
      - "7870:7870"
    volumes:
      - localocr_correction_data:/app/correction_data
      - localocr_history:/tmp/pdf_ocr_history
    devices:
      - /dev/dri:/dev/dri
      - /dev/accel:/dev/accel
    group_add:
      - video
      - render

volumes:
  localocr_correction_data:
  localocr_history: