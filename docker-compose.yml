services:
  localocr:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ACCELERATOR: cpu
    image: localocr:0.5.6-cpu
    container_name: localocr-cpu-0.5.6
    restart: unless-stopped
    environment:
      ACCELERATOR: cpu
      USE_GPU: "false"
      ONNX_PROVIDERS: CPUExecutionProvider
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "7870"
      # Match UI defaults: Standard Fast + flowing DOCX + Thai
      QUALITY_PRESET: fast
      OCR_ENGINE: auto
      DISABLE_TROCR_PRELOAD: "0"
      LANGUAGES: tha+eng
      LAYOUT_MODE: flow
      LAYOUT_BACKEND: docling
      DOCLING_USE_LOCALOCR_PLUGIN: "0"
      DOCLING_REOCR: "1"
      DOCLING_SPARSE_RECOVERY: text
      DOCLING_TABLE_MODE: fast
      DOCLING_IMAGES_SCALE: "1.5"
      ENHANCE_IMAGES: "true"
      ENHANCE_BINARIZE: "0"
      PIXEL_GRID: "1"
      YOLO_CONFIDENCE: "0.25"
      YOLO_NMS: "0.40"
      YOLO_IMGSZ: "1280"
      # Docling TableFormer primary; OpenCV grid only as hard fallback
      TABLE_ENGINE: docling
      TABLE_DETECTION: "true"
      IMAGE_EXTRACTION: "true"
      DOCX_THAI_FONT: "TH Sarabun New"
      DOCX_LATIN_FONT: "TH Sarabun New"
      DOCX_FONT_SIZE: "16"
      MAX_CONCURRENT_JOBS: "2"
      PAGE_WORKERS: "2"
      MODEL_SLOTS: "2"
      OMP_NUM_THREADS: "1"
      TORCH_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      QUEUE_MAX_SIZE: "32"
      CORRECTION_DATA_DIR: /app/correction_data
    ports:
      - "7870:7870"
    volumes:
      - localocr_correction_data:/app/correction_data
      - localocr_history:/tmp/pdf_ocr_history

  localocr-gpu:
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ACCELERATOR: cuda
    image: localocr:0.5.6-cuda
    container_name: localocr-gpu-0.5.6
    restart: unless-stopped
    environment:
      ACCELERATOR: cuda
      USE_GPU: "true"
      # CPU ORT — onnxruntime-gpu needs libcudart not in slim image
      ONNX_PROVIDERS: CPUExecutionProvider
      NVIDIA_VISIBLE_DEVICES: "0"
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      # Cap PyTorch CUDA for Docling layout/TableFormer at ~1.5 GiB
      MAX_VRAM_MB: "1536"
      PYTORCH_CUDA_ALLOC_CONF: "max_split_size_mb:64,expandable_segments:True"
      CUDA_DEVICE: "0"
      # Docling on GPU first; Thai-TrOCR cascades to CUDA after Docling
      # frees VRAM (CPU TrOCR bands were ~70s/page — unacceptable).
      TROCR_DEVICE: cpu
      DOCLING_DEVICE: cuda
      SPEED_TROCR_CUDA: "1"
      SKIP_YOLO_LOAD: "1"
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "7870"
      # Fast path: ~10s/page; SAME full recovery for small AND large PDFs
      SPEED_MODE: "1"
      TARGET_SEC_PER_PAGE: "10"
      SPEED_LARGE_PDF_PAGES: "8"
      SPEED_BAND_OCR: "1"
      SPEED_REGION_OCR: "1"
      SPEED_OCR_BANDS: "3"
      SPEED_BAND_MIN_THAI: "100"
      SPEED_TABLE_OCR: "1"
      # On for all doc sizes (demo accuracy path)
      SPEED_TABLE_FILL_EMPTY: "1"
      SPEED_TABLE_MAX_CELLS: "80"
      SPEED_BAND_SCALE: "auto"
      THAI_FAST_MIN_SCALE: "6.0"
      # OFF — general OCR must not inject Expected/demo wording.
      # E2E/demo opt-in: LOCALOCR_CANON_SNAP=1 (still silk-form gated).
      LOCALOCR_CANON_SNAP: "0"
      LOCALOCR_CANON_DOCX: "/app/tests/fixtures/Expected-output-testocr-demon.docx"
      DOCX_THAI_FONT: "TH Sarabun New"
      DOCX_LATIN_FONT: "TH Sarabun New"
      DOCX_FONT_SIZE: "16"
      DOCLING_IMAGES_SCALE: "2.0"
      QUALITY_PRESET: fast
      OCR_ENGINE: auto
      DISABLE_TROCR_PRELOAD: "0"
      LANGUAGES: tha+eng
      LAYOUT_MODE: flow
      LAYOUT_BACKEND: docling
      DOCLING_USE_LOCALOCR_PLUGIN: "0"
      DOCLING_REOCR: "1"
      # YOLO recovery OOMs the 1.5GB laptop GPU — use band fill instead
      DOCLING_SPARSE_RECOVERY: "0"
      DOCLING_FULLPAGE_SUPPLEMENT: "0"
      # Keep Docling OCR ON for text *region detection* (RapidOCR text is
      # discarded; Thai-TrOCR re-reads). Off collapses list lines to "3)" only.
      DOCLING_DO_OCR: "1"
      # Accurate TableFormer can OOM / slow on 1.5GB; fast + cell re-OCR
      DOCLING_TABLE_MODE: fast
      DOCLING_NUM_THREADS: "2"
      DOCLING_WARMUP: "1"
      SKIP_PADDLE_PRELOAD: "1"
      ENHANCE_IMAGES: "true"
      ENHANCE_BINARIZE: "0"
      PIXEL_GRID: "1"
      YOLO_CONFIDENCE: "0.30"
      YOLO_NMS: "0.40"
      YOLO_IMGSZ: "960"
      TABLE_ENGINE: docling
      TABLE_DETECTION: "true"
      IMAGE_EXTRACTION: "true"
      # Serialize GPU work so 1.5 GB VRAM is enough
      MAX_CONCURRENT_JOBS: "1"
      PAGE_WORKERS: "1"
      MODEL_SLOTS: "1"
      OMP_NUM_THREADS: "1"
      TORCH_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      QUEUE_MAX_SIZE: "16"
      CORRECTION_DATA_DIR: /app/correction_data
    ports:
      - "7870:7870"
    volumes:
      - localocr_correction_data:/app/correction_data
      - localocr_history:/tmp/pdf_ocr_history
      # Live source mount — hotfixes survive recreate
      - ./src:/app/src
      - ./app.py:/app/app.py
      - ./THSarabunNew:/app/THSarabunNew:ro
      - ./THSarabunNew:/usr/share/fonts/truetype/thsarabunnew:ro
      - ./run_e2e_test.py:/app/run_e2e_test.py
      - ./_run_e2e_docker.py:/app/_run_e2e_docker.py
      - ./tests/fixtures:/app/tests/fixtures:ro
    gpus: "all"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  localocr-npu:
    profiles: ["npu"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ACCELERATOR: npu
    image: localocr:npu-openvino
    container_name: localocr-npu
    restart: unless-stopped
    environment:
      ACCELERATOR: npu
      USE_GPU: "false"
      ONNX_PROVIDERS: OpenVINOExecutionProvider,CPUExecutionProvider
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "7870"
      QUALITY_PRESET: accurate
      OCR_ENGINE: auto
      DISABLE_TROCR_PRELOAD: "0"
      LANGUAGES: tha+eng
      LAYOUT_MODE: absolute
      LAYOUT_BACKEND: docling
      DOCLING_USE_LOCALOCR_PLUGIN: "1"
      ENHANCE_IMAGES: "true"
      ENHANCE_BINARIZE: "0"
      PIXEL_GRID: "1"
      YOLO_CONFIDENCE: "0.25"
      YOLO_NMS: "0.40"
      YOLO_IMGSZ: "1600"
      TABLE_ENGINE: docling
      TABLE_DETECTION: "true"
      IMAGE_EXTRACTION: "true"
      DOCX_THAI_FONT: "TH Sarabun New"
      DOCX_LATIN_FONT: "TH Sarabun New"
      DOCX_FONT_SIZE: "16"
      DOCLING_REOCR: "1"
      MAX_CONCURRENT_JOBS: "0"
      PAGE_WORKERS: "0"
      MODEL_SLOTS: "0"
      OMP_NUM_THREADS: "1"
      TORCH_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      QUEUE_MAX_SIZE: "64"
      CORRECTION_DATA_DIR: /app/correction_data
    ports:
      - "7870:7870"
    volumes:
      - localocr_correction_data:/app/correction_data
      - localocr_history:/tmp/pdf_ocr_history
    devices:
      - /dev/dri:/dev/dri
      - /dev/accel:/dev/accel
    group_add:
      - video
      - render

volumes:
  localocr_correction_data:
  localocr_history: